name: build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\LinkShelf.slnx

      - name: Build
        run: dotnet build .\LinkShelf.slnx -c Release --no-restore

      - name: Run Core tests
        run: dotnet run --project .\LinkShelf.Core.Tests\LinkShelf.Core.Tests.csproj -c Release --no-build

      - name: Publish single file
        run: >
          dotnet publish .\LinkShelf.csproj
          -t:Rebuild
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o .\dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: LinkShelf-win-x64
          path: .\dist\LinkShelf.exe

  cli:
    name: cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore CLI
        run: dotnet restore ./LinkShelf.Cli/LinkShelf.Cli.csproj

      - name: Build CLI
        run: dotnet build ./LinkShelf.Cli/LinkShelf.Cli.csproj -c Release --no-restore

      - name: Restore Core tests
        run: dotnet restore ./LinkShelf.Core.Tests/LinkShelf.Core.Tests.csproj

      - name: Build Core tests
        run: dotnet build ./LinkShelf.Core.Tests/LinkShelf.Core.Tests.csproj -c Release --no-restore

      - name: Run Core tests
        run: dotnet run --project ./LinkShelf.Core.Tests/LinkShelf.Core.Tests.csproj -c Release --no-build
