name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\LinkShelf.csproj

      - name: Build
        run: dotnet build .\LinkShelf.csproj -c Release --no-restore

      - name: Publish single file
        run: >
          dotnet publish .\LinkShelf.csproj
          -t:Rebuild
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o .\dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: LinkShelf-win-x64
          path: .\dist\LinkShelf.exe
